    <header class="header">
        <div class="inner_1440">
            <a href="index.html">

            <nav class="nav">

    <main class="main">
        <section class="section services-section">
            <div class="inner_1440">
                <h2 class="section__title">서비스 안내</h2>
                <div class="services__grid">
                    <div class="service__card">
                        <h3>장례 절차 안내</h3>
                        <p>처음부터 끝까지 전문 장례지도사가 동행하며 모든 절차를 안내합니다.</p>

                        <h3>24시간 상담</h3>
                        <p>언제든 문의하실 수 있도록 24시간 상담 서비스를 제공합니다.</p>
                    </div>
                    <div class="service__card">
                        <h3>부고장 제작</h3>
                        <p>온라인/오프라인 부고장 제작 및 발송을 지원합니다.</p>
                    </div>
                    <div class="service__card">
                        <h3>추모 영상/헌화</h3>
                        <p>고인을 위한 추모 영상과 헌화 서비스를 제공합니다.</p>
                    </div>
                </div>
            </div>
        </section>
